name: CI

on:
  pull_request:
    branches: [main]

# Cancel earlier runs on the same PR when a new commit lands.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v6.0.5
        with:
          version: 9.12.2

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # Only @skerry/shared needs a host-side build: its package.json points
      # exports at dist/, and lint + typecheck run on the host and resolve
      # `@skerry/shared` from there. Without this, every consumer package
      # fails with `Cannot find module '@skerry/shared'` plus a cascade of
      # implicitly-any errors on parameters whose types come from shared.
      # control-plane and web are built inside their Docker images by
      # test:env:up, not on the host — so we skip those here.
      - name: Build @skerry/shared (so consumer lint/typecheck can resolve types)
        run: pnpm --filter @skerry/shared build

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      # test:env:up is `docker compose up -d --build`, which runs the
      # control-plane and web builds inside their respective images. A
      # broken build in either app fails this step.
      - name: Bring up test stack (Docker)
        run: pnpm test:env:up

      - name: Install Playwright browsers
        run: pnpm --filter @skerry/web exec playwright install --with-deps chromium

      # `pnpm test:all` runs unit tests (which need the test Postgres on
      # 5433, brought up above) and then the Playwright E2E suite against
      # the test stack on http://localhost:8080.
      - name: Run all tests (unit + E2E)
        run: pnpm test:all

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: apps/web/playwright-report/
          retention-days: 7

      - name: Upload Playwright test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-test-results
          path: apps/web/test-results/
          retention-days: 7

      - name: Tear down test stack
        if: always()
        run: pnpm test:env:down
