name: skerry-test

services:
  postgres:
    image: postgres:16
    env_file:
      - .env.test
    # POSTGRES_DB, etc. will be picked up from .env.test
    ports:
      - "5433:5432"
    volumes:
      - pg_data_test:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  synapse:
    image: matrixdotorg/synapse:latest
    env_file:
      - .env.test
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SYNAPSE_SERVER_NAME: hub-localhost
      SYNAPSE_REPORT_STATS: "no"
    volumes:
      - ./docker/synapse-test:/data
    deploy:
      resources:
        limits:
          memory: 1G

  livekit:
    image: livekit/livekit-server:v1.9.11
    env_file:
      - .env.test
    command: [ "--dev", "--bind", "0.0.0.0" ]
    ports:
      - "7883:7880"
      - "7884:7881"
      - "7885:7882/udp"

  control-plane:
    build:
      context: .
      target: control-plane
      args:
        NEXT_PUBLIC_BASE_DOMAIN: localhost
    env_file:
      - .env.test
    # DATABASE_URL, etc. will be picked up from .env.test
    depends_on:
      postgres:
        condition: service_healthy
      synapse:
        condition: service_started
    volumes:
      - ./docker/synapse-test:/app/docker/synapse # Mount test config dir for updates
    healthcheck:
      test: ["CMD", "node", "-e", "const http = require('http'); const req = http.get('http://localhost:4000/health', (res) => { if (res.statusCode === 200) { process.exit(0); } else { process.exit(1); } }); req.on('error', (err) => { process.exit(1); });"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build:
      context: .
      target: web
      args:
        NEXT_PUBLIC_BASE_DOMAIN: localhost
    env_file:
      - .env.test
    depends_on:
      control-plane:
        condition: service_healthy

  caddy:
    image: caddy:latest
    ports:
      - "8080:80"
    volumes:
      - ./docker/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data_test:/data
      - caddy_config_test:/config
    environment:
      - NEXT_PUBLIC_BASE_DOMAIN=localhost
      - EMAIL=test@example.com
    depends_on:
      web:
        condition: service_started
      control-plane:
        condition: service_healthy

volumes:
  pg_data_test:
  caddy_data_test:
  caddy_config_test:
