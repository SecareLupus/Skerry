name: Publish Docker Images

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g. v0.1.0-alpha)'
        required: true
        type: string

env:
  REGISTRY: ghcr.io
  DOCKER_BUILDKIT: 1

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        target:
          - name: control-plane
            docker-target: control-plane
          - name: web
            docker-target: web
          - name: sticker-renderer
            docker-target: sticker-renderer

    steps:
      - uses: actions/checkout@v4

      - name: Lowercase owner (GHCR requires lowercase image names)
        id: repo
        run: echo "owner=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push ${{ matrix.target.name }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          target: ${{ matrix.target.docker-target }}
          push: true
          cache-from: |
            type=registry,ref=${{ env.REGISTRY }}/${{ steps.repo.outputs.owner }}/skerry-${{ matrix.target.name }}:buildcache
          cache-to: |
            type=registry,ref=${{ env.REGISTRY }}/${{ steps.repo.outputs.owner }}/skerry-${{ matrix.target.name }}:buildcache,mode=max
          tags: |
            ${{ env.REGISTRY }}/${{ steps.repo.outputs.owner }}/skerry-${{ matrix.target.name }}:${{ github.event.inputs.version }}
            ${{ env.REGISTRY }}/${{ steps.repo.outputs.owner }}/skerry-${{ matrix.target.name }}:latest

  release:
    needs: build-and-push
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Create git tag
        run: |
          git tag ${{ github.event.inputs.version }}
          git push origin ${{ github.event.inputs.version }}

      - name: Package deploy kit
        run: |
          tar -czf skerry-deploy-${{ github.event.inputs.version }}.tar.gz deploy/

      - name: Upload deploy kit
        uses: actions/upload-artifact@v4
        with:
          name: skerry-deploy-${{ github.event.inputs.version }}
          path: skerry-deploy-${{ github.event.inputs.version }}.tar.gz
          retention-days: 90
