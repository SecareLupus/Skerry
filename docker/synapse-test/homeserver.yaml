# Configuration file for Synapse.
server_name: "hub-localhost"
cors_allow_origins: ["*"]
pid_file: /var/lib/synapse/homeserver.pid
listeners:
  - port: 8008
    resources:
      - names: [client, federation, media]
        compress: false
    tls: false
    type: http
    x_forwarded: false
database:
  name: sqlite3
  args:
    database: /var/lib/synapse/homeserver.db
log_config: "/data/hub-localhost.log.config"
media_store_path: /var/lib/synapse/media_store
registration_shared_secret: "JcOYCz8LxB_f+,N1e~Y#W^r.CKDb@:udYg3RZkCqc;Nl5Dn&jx"
report_stats: false
macaroon_secret_key: "l,gRdq;ARsYoaF~dBj9D0&s-BHlHv;m__RnPbhxwr=9VfpaC2D"
form_secret: "2ekUjE_ngCMFb0UD41V^HG13rF^P.,m5FGVbL~HDVt4am79i&p"
signing_key_path: "/data/hub-localhost.signing.key"
trusted_key_servers:
  - server_name: "matrix.org"

enable_authenticated_media: false
app_service_config_files:
  - /data/skerry-appservice.yaml

# Test-only rate-limit overrides. Synapse's defaults are tuned for a public
# homeserver; in E2E we create/invite/join rooms in bursts from a single
# admin user, which trips `rc_message`, `rc_invites`, `rc_joins`, and
# `rc_admin_redaction` within seconds. A failed createRoom returns 429 and
# the server is persisted with matrix_space_id = null, which then breaks
# later moderation actions (kick/ban can't resolve a Matrix room).
# The limits below are effectively unbounded for test load.
rc_message:
  per_second: 1000
  burst_count: 1000
rc_registration:
  per_second: 1000
  burst_count: 1000
rc_login:
  address:
    per_second: 1000
    burst_count: 1000
  account:
    per_second: 1000
    burst_count: 1000
  failed_attempts:
    per_second: 1000
    burst_count: 1000
rc_admin_redaction:
  per_second: 1000
  burst_count: 1000
rc_joins:
  local:
    per_second: 1000
    burst_count: 1000
  remote:
    per_second: 1000
    burst_count: 1000
rc_joins_per_room:
  per_second: 1000
  burst_count: 1000
rc_invites:
  per_room:
    per_second: 1000
    burst_count: 1000
  per_user:
    per_second: 1000
    burst_count: 1000
  per_issuer:
    per_second: 1000
    burst_count: 1000
rc_third_party_invite:
  per_second: 1000
  burst_count: 1000
rc_room_creation:
  per_second: 1000
  burst_count: 1000
# vim:ft=yaml
