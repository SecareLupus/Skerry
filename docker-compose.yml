services:
  postgres:
    image: postgres:16
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    deploy:
      resources:
        limits:
          memory: 512M
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  synapse:
    image: matrixdotorg/synapse:latest
    env_file:
      - .env
    depends_on:
      - postgres
    environment:
      SYNAPSE_SERVER_NAME: hub-localhost
      SYNAPSE_REPORT_STATS: "no"
    # Port 8008 is now internal only
    volumes:
      - ./docker/synapse:/data
    deploy:
      resources:
        limits:
          memory: 1G

  livekit:
    image: livekit/livekit-server:v1.9.11
    env_file:
      - .env
    command: [ "--dev", "--bind", "0.0.0.0" ]
    # Signaling port 7880 is now internal only
    ports:
      - "7881:7881"
      - "7882:7882/udp"

  coturn:
    image: coturn/coturn:4.6
    env_file:
      - .env
    command: [ "-n", "--log-file=stdout", "--realm=localhost", "--fingerprint" ]
    ports:
      - "3478:3478"
      - "3478:3478/udp"

  control-plane:
    build:
      context: .
      target: control-plane
      args:
        NEXT_PUBLIC_BASE_DOMAIN: ${BASE_DOMAIN}
    networks:
      - default
      - backend
    env_file:
      - .env
    environment:
      - PORT=4000
      - DATABASE_URL=postgres://postgres:${POSTGRES_PASSWORD}@postgres:5432/skerry
      - NEXT_PUBLIC_BASE_DOMAIN=${BASE_DOMAIN}
      - SESSION_SECRET=${SESSION_SECRET}
      - OIDC_DISCORD_CLIENT_ID=${OIDC_DISCORD_CLIENT_ID}
      - OIDC_DISCORD_CLIENT_SECRET=${OIDC_DISCORD_CLIENT_SECRET}
      - OIDC_GOOGLE_CLIENT_ID=${OIDC_GOOGLE_CLIENT_ID}
      - OIDC_GOOGLE_CLIENT_SECRET=${OIDC_GOOGLE_CLIENT_SECRET}
      - OIDC_TWITCH_CLIENT_ID=${OIDC_TWITCH_CLIENT_ID}
      - OIDC_TWITCH_CLIENT_SECRET=${OIDC_TWITCH_CLIENT_SECRET}
      - DISCORD_BRIDGE_CLIENT_ID=${DISCORD_BRIDGE_CLIENT_ID}
      - DISCORD_BRIDGE_CLIENT_SECRET=${DISCORD_BRIDGE_CLIENT_SECRET}
      - DISCORD_BRIDGE_BOT_TOKEN=${DISCORD_BRIDGE_BOT_TOKEN}
      - SYNAPSE_AS_REGISTRATION_PATH=/app/docker/synapse/skerry-appservice.yaml
    depends_on:
      - postgres
      - synapse
      - livekit
    volumes:
      - ./docker/synapse:/app/docker/synapse
    deploy:
      resources:
        limits:
          memory: 512M
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  web:
    build:
      context: .
      target: web
      args:
        NEXT_PUBLIC_BASE_DOMAIN: ${BASE_DOMAIN}
    networks:
      - default
      - backend
    env_file:
      - .env
    environment:
      - PORT=3000
      - NEXT_PUBLIC_BASE_DOMAIN=${BASE_DOMAIN}
    depends_on:
      - control-plane
    deploy:
      resources:
        limits:
          memory: 512M

  caddy:
    image: caddy:latest
    restart: unless-stopped
    networks:
      - default
      - backend
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    environment:
      - NEXT_PUBLIC_BASE_DOMAIN=${BASE_DOMAIN}
      - EMAIL=${EMAIL}
    deploy:
      resources:
        limits:
          memory: 128M
  
  db-backup:
    image: postgres:16-alpine
    container_name: skerry-db-backup
    restart: unless-stopped
    volumes:
      - ./scripts/backup-db.sh:/usr/local/bin/backup-db.sh:ro
      - pg_backups:/backups
    environment:
      - PGHOST=postgres
      - PGUSER=${POSTGRES_USER}
      - PGPASSWORD=${POSTGRES_PASSWORD}
      - PGDATABASE=${POSTGRES_DB}
    entrypoint: ["sh", "-c", "while true; do /usr/local/bin/backup-db.sh; sleep 86400; done"]
    depends_on:
      - postgres

networks:
  default:
    name: skerry_default
  backend:
    name: skerry_backend

volumes:
  pg_data:
  pg_backups:
  synapse_data:
  livekit_data:
  caddy_data:
  caddy_config:
